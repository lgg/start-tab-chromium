name: Sync package lock version

on:
  push:
    branches:
      - codex/sync-package-lock-version-20260718

permissions:
  contents: write

jobs:
  sync:
    runs-on: start-tab-chromium-ci
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Align package-lock metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $package = Get-Content -LiteralPath package.json -Raw | ConvertFrom-Json
          $content = Get-Content -LiteralPath package-lock.json -Raw
          $old = '"version": "2.0.0"'
          $new = '"version": "' + $package.version + '"'

          $first = $content.IndexOf($old, [System.StringComparison]::Ordinal)
          if ($first -lt 0) {
            $newCount = ([regex]::Matches($content, [regex]::Escape($new))).Count
            if ($newCount -ge 2) {
              Write-Host 'package-lock metadata is already aligned'
              exit 0
            }
            throw 'Could not find the top-level package-lock version field'
          }

          $second = $content.IndexOf($old, $first + $old.Length, [System.StringComparison]::Ordinal)
          if ($second -lt 0) {
            throw 'Could not find the root package entry version field'
          }

          $content = $content.Remove($second, $old.Length).Insert($second, $new)
          $content = $content.Remove($first, $old.Length).Insert($first, $new)
          [System.IO.File]::WriteAllText(
            (Resolve-Path package-lock.json),
            $content,
            [System.Text.UTF8Encoding]::new($false)
          )

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          if ([string]::IsNullOrWhiteSpace((git status --porcelain))) {
            Write-Host 'No package-lock change to commit'
            exit 0
          }
          git commit -m 'Align package-lock version with release metadata'
          git push origin HEAD
