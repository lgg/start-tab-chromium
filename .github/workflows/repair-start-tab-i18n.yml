name: Repair Start Tab i18n update

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply update and create missing i18n files
        shell: bash
        run: |
          set -euo pipefail
          awk '/^ZGlmZi/{print; found=1; next} /^PATCH_B64$/{exit} found{print}' .github/workflows/apply-start-tab-i18n.yml | base64 -d > /tmp/start-tab-i18n.patch
          git apply /tmp/start-tab-i18n.patch

          mkdir -p src/lib src/_locales/en src/_locales/ru
          cat > src/lib/i18n.ts <<'EOF_I18N'
const DEFAULT_LOCALE = "en";
const SUPPORTED_LOCALES = ["en", "ru"] as const;

type SupportedLocale = (typeof SUPPORTED_LOCALES)[number];

interface LocaleMessage {
  message: string;
}

type LocaleCatalog = Record<string, LocaleMessage>;

export interface I18n {
  locale: SupportedLocale;
  t: (key: string, replacements?: Record<string, string | number>) => string;
  list: (key: string) => string[];
}

function normalizeLocale(locale: string): SupportedLocale | null {
  const normalized = locale.toLowerCase().replace("_", "-");
  const [language] = normalized.split("-");
  return SUPPORTED_LOCALES.find((supported) => supported === language) ?? null;
}

function detectLocale(): SupportedLocale {
  const browserLanguages =
    navigator.languages.length > 0 ? navigator.languages : [navigator.language];

  for (const language of browserLanguages) {
    const supported = normalizeLocale(language);
    if (supported) return supported;
  }

  return DEFAULT_LOCALE;
}

async function loadCatalog(locale: SupportedLocale): Promise<LocaleCatalog> {
  const response = await fetch(
    chrome.runtime.getURL(`_locales/${locale}/messages.json`),
  );
  if (!response.ok) {
    throw new Error(`Unable to load locale catalog: ${locale}`);
  }
  return (await response.json()) as LocaleCatalog;
}

export async function loadI18n(): Promise<I18n> {
  const locale = detectLocale();
  const catalog =
    locale === DEFAULT_LOCALE
      ? await loadCatalog(DEFAULT_LOCALE)
      : { ...(await loadCatalog(DEFAULT_LOCALE)), ...(await loadCatalog(locale)) };

  document.documentElement.lang = locale;

  const t = (
    key: string,
    replacements: Record<string, string | number> = {},
  ): string => {
    const template = catalog[key]?.message ?? key;
    return Object.entries(replacements).reduce(
      (message, [name, value]) =>
        message.replaceAll(`{${name}}`, String(value)),
      template,
    );
  };

  return {
    locale,
    t,
    list: (key: string) => t(key).split("|").filter(Boolean),
  };
}

export function translateDocument(i18n: I18n): void {
  document.querySelectorAll<HTMLElement>("[data-i18n]").forEach((element) => {
    const key = element.dataset.i18n;
    if (key) element.textContent = i18n.t(key);
  });

  document.querySelectorAll<HTMLElement>("[data-i18n-title]").forEach((element) => {
    const key = element.dataset.i18nTitle;
    if (key) element.title = i18n.t(key);
  });
}
EOF_I18N

