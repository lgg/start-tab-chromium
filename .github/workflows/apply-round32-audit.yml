name: Apply Round 32 audit

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v6
        with:
          ref: codex/post-round31-deep-audit-20260722
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Normalize applicator
        run: node scripts/normalize-round32-applicator.mjs

      - name: Apply audited patch
        run: |
          node scripts/apply-round32-audit.mjs
          node scripts/finalize-round32-generated.mjs
          rm -f scripts/normalize-round32-applicator.mjs scripts/finalize-round32-generated.mjs
          git diff --check

      - name: Install dependencies
        run: npm ci --include=dev --bin-links=true --no-audit --no-fund --loglevel=error

      - name: Run Round 32 corruption fixtures
        run: node scripts/run-round32-fixtures.mjs

      - name: Validate Round 32 contracts
        run: node scripts/validate-round32-static.mjs

      - name: Typecheck audited source
        run: npm run typecheck

      - name: Build full extension
        run: npm run build

      - name: Build blocker-only extension
        run: npm run build:blocker-only

      - name: Build Google-enabled extension
        env:
          GOOGLE_OAUTH_CLIENT_ID: round32-ci.apps.googleusercontent.com
        run: npm run build:google

      - name: Create validated Git commit object
        id: publish-commit
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          rm -f .github/workflows/apply-round32-audit.yml
          git diff --check
          cat > /tmp/publish-round32.py <<'PY'
          import base64
          import json
          import os
          import pathlib
          import subprocess
          import urllib.error
          import urllib.request

          repository = os.environ["GH_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          head = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()

          def api(method, endpoint, payload=None):
              data = None if payload is None else json.dumps(payload).encode()
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}{endpoint}",
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(request) as response:
                      return json.load(response)
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"{method} {endpoint} failed with HTTP {error.code}: {body}") from error

          base_tree = api("GET", f"/git/commits/{head}")["tree"]["sha"]
          status = subprocess.check_output(
              ["git", "diff", "--name-status", "--no-renames", "HEAD"],
              text=True,
          ).splitlines()
          entries = []
          for line in status:
              state, path = line.split("\t", 1)
              if state == "D":
                  entries.append({"path": path, "mode": "100644", "type": "blob", "sha": None})
                  continue
              content = base64.b64encode(pathlib.Path(path).read_bytes()).decode()
              blob = api("POST", "/git/blobs", {"content": content, "encoding": "base64"})
              mode = "100755" if os.access(path, os.X_OK) else "100644"
              entries.append({"path": path, "mode": mode, "type": "blob", "sha": blob["sha"]})

          tree = api("POST", "/git/trees", {"base_tree": base_tree, "tree": entries})
          commit = api("POST", "/git/commits", {
              "message": "Repair Browser Sync snapshot integrity",
              "tree": tree["sha"],
              "parents": [head],
          })
          pathlib.Path("round32-validated-commit.txt").write_text(commit["sha"] + "\n")
          print(json.dumps({"head": head, "tree": tree["sha"], "commit": commit["sha"], "entries": len(entries)}))
          PY
          set -o pipefail
          python /tmp/publish-round32.py 2>&1 | tee round32-publication-diagnostic.txt

      - name: Upload publication diagnostic
        if: steps.publish-commit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: round32-publication-diagnostic
          path: round32-publication-diagnostic.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce publication result
        if: steps.publish-commit.outcome == 'failure'
        run: exit 1

      - name: Upload validated commit reference
        uses: actions/upload-artifact@v4
        with:
          name: round32-validated-commit
          path: round32-validated-commit.txt
          if-no-files-found: error
          retention-days: 1
