name: Apply Round 32 audit

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v6
        with:
          ref: codex/post-round31-deep-audit-20260722
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Normalize applicator
        run: node scripts/normalize-round32-applicator.mjs

      - name: Apply audited patch
        run: |
          node scripts/apply-round32-audit.mjs
          rm -f scripts/normalize-round32-applicator.mjs
          git diff --check

      - name: Install dependencies
        run: npm ci --include=dev --bin-links=true --no-audit --no-fund --loglevel=error

      - name: Run Round 32 corruption fixtures
        id: round32-fixtures
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/run-round32-fixtures.mjs 2>&1 | tee round32-fixture-diagnostic.txt

      - name: Upload Round 32 fixture diagnostic
        if: steps.round32-fixtures.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: round32-fixture-diagnostic
          path: round32-fixture-diagnostic.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce Round 32 fixture result
        if: steps.round32-fixtures.outcome == 'failure'
        run: exit 1

      - name: Remove fixture log
        run: rm -f round32-fixture-diagnostic.txt

      - name: Validate Round 32 contracts
        id: round32-contracts
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/validate-round32-static.mjs 2>&1 | tee round32-contract-diagnostic.txt

      - name: Upload Round 32 contract diagnostic
        if: steps.round32-contracts.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: round32-contract-diagnostic
          path: round32-contract-diagnostic.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce Round 32 contract result
        if: steps.round32-contracts.outcome == 'failure'
        run: exit 1

      - name: Remove contract log
        run: rm -f round32-contract-diagnostic.txt

      - name: Typecheck audited source
        run: npm run typecheck

      - name: Build full extension
        run: npm run build

      - name: Build blocker-only extension
        run: npm run build:blocker-only

      - name: Build Google-enabled extension
        env:
          GOOGLE_OAUTH_CLIENT_ID: round32-ci.apps.googleusercontent.com
        run: npm run build:google

      - name: Package validated source files
        run: |
          tar -czf round32-validated-output.tar.gz \
            src/lib/chrome-sync.ts \
            package.json \
            .github/workflows/ci.yml \
            scripts/validate-self-hosted-ci.mjs \
            scripts/round32-fixtures.ts \
            scripts/run-round32-fixtures.mjs \
            scripts/validate-round32-static.mjs \
            docs/audit-2026-07-22-round-32.md

      - name: Upload validated source package
        uses: actions/upload-artifact@v4
        with:
          name: round32-validated-output
          path: round32-validated-output.tar.gz
          if-no-files-found: error
          retention-days: 1
