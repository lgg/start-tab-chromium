name: Apply Round 32 audit

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v6
        with:
          ref: codex/post-round31-deep-audit-20260722
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Normalize applicator
        run: node scripts/normalize-round32-applicator.mjs

      - name: Apply audited patch
        run: |
          node scripts/apply-round32-audit.mjs
          rm -f scripts/normalize-round32-applicator.mjs

      - name: Install dependencies
        run: npm ci --include=dev --bin-links=true --no-audit --no-fund --loglevel=error

      - name: Run complete regression suite
        run: |
          git diff --check
          npm test
          npm run typecheck
          npm run build
          npm run build:blocker-only
          GOOGLE_OAUTH_CLIENT_ID=round32-ci.apps.googleusercontent.com npm run build:google

      - name: Publish audited source patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Repair corrupt matching Browser Sync snapshots"
          git push origin HEAD:codex/post-round31-deep-audit-20260722
