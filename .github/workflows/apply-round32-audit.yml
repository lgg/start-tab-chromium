name: Apply Round 32 audit

on:
  push:
    branches:
      - codex/post-round31-deep-audit-20260722
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: start-tab-chromium-ci
    timeout-minutes: 10
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v6
        with:
          ref: codex/post-round31-deep-audit-20260722
          fetch-depth: 0
          persist-credentials: true
          clean: false

      - name: Normalize applicator for Windows checkout
        run: node scripts/normalize-round32-applicator.mjs

      - name: Apply audited patch
        run: |
          node scripts/apply-round32-audit.mjs
          Remove-Item scripts/normalize-round32-applicator.mjs -Force

      - name: Validate patch shape
        run: |
          git diff --check
          node scripts/validate-round32-static.mjs

      - name: Publish audited source patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Repair corrupt matching Browser Sync snapshots"
          git push origin HEAD:codex/post-round31-deep-audit-20260722
