name: Apply Round 9 race fix

on:
  push:
    branches:
      - codex/deep-audit-round-9-20260715

permissions:
  contents: write

jobs:
  apply-validate-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply exact audited patch
        run: |
          base64 -d .github/round9-race.patch.gz.b64 | gzip -d > /tmp/round9-race.patch
          git apply --check -p1 /tmp/round9-race.patch
          git apply -p1 /tmp/round9-race.patch
          rm .github/round9-race.patch.gz.b64 .github/workflows/apply-round9-race-fix.yml
          git diff --check
      - name: Validate exact updated snapshot
        run: |
          npm ci --no-audit --no-fund --loglevel=error
          npm test
          npm run typecheck
          npm run build
          npm run build:blocker-only
          GOOGLE_OAUTH_CLIENT_ID=round9-race.apps.googleusercontent.com npm run build:google
          npm audit --omit=dev --audit-level=low
      - name: Commit validated race fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix stale clock alarm scheduling race"
          git push origin "HEAD:${GITHUB_REF_NAME}"
