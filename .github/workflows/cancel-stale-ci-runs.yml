name: Cancel stale CI runs

on:
  pull_request:
    branches:
      - master

permissions:
  actions: write
  contents: read

jobs:
  cancel-stale-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Cancel queued runs from the previous CI definition
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}"
          runs="$(curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api}/actions/workflows/ci.yml/runs?status=queued&per_page=100")"

          mapfile -t run_ids < <(python -c 'import json,sys; print("\n".join(str(run["id"]) for run in json.load(sys.stdin).get("workflow_runs", [])))' <<<"${runs}")
          for run_id in "${run_ids[@]}"; do
            test -n "${run_id}" || continue
            echo "Cancelling queued CI run ${run_id}"
            curl --fail --silent --show-error \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api}/actions/runs/${run_id}/cancel" || true
          done
