name: Clean Round 9 generated artifacts

on:
  push:
    branches:
      - codex/deep-audit-round-9-20260715

permissions:
  contents: write

jobs:
  validate-clean-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate updated source snapshot
        run: |
          npm ci --no-audit --no-fund --loglevel=error
          npm test
          npm run typecheck
          npm run build
          npm run build:blocker-only
          GOOGLE_OAUTH_CLIENT_ID=round9-cleanup.apps.googleusercontent.com npm run build:google
          npm audit --omit=dev --audit-level=low
      - name: Remove generated outputs and temporary workflow
        run: |
          rm -rf build-blocker-only build-google
          rm .github/workflows/cleanup-round9-generated.yml
          git diff --check
      - name: Commit clean source-only diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove generated build artifacts from audit PR"
          git push origin "HEAD:${GITHUB_REF_NAME}"
