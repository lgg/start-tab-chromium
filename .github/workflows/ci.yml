name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - codex/deep-audit-round-5-branches-20260714

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-round5-tree:
    if: github.event_name == 'push' && github.ref_name == 'codex/deep-audit-round-5-branches-20260714'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Apply audited Git tree
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PARENT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const api = async (path, init = {}) => {
            const response = await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}${path}`, {
              ...init,
              headers: {
                Accept: "application/vnd.github+json",
                Authorization: `Bearer ${process.env.GH_TOKEN}`,
                "X-GitHub-Api-Version": "2022-11-28",
                "Content-Type": "application/json",
                ...(init.headers || {}),
              },
            });
            if (!response.ok) throw new Error(`${init.method || "GET"} ${path}: ${response.status} ${await response.text()}`);
            return response.status === 204 ? null : response.json();
          };

          const tree = await api("/git/trees", {
            method: "POST",
            body: JSON.stringify({
              base_tree: "6f776b78d17a9ba1952bf0f3adc078a52856f3ac",
              tree: [
                { path: "src/lib/blocklist.ts", mode: "100644", type: "blob", sha: "53b4e3197cd555138ef721d7dbaf6e7ccfba38a7" },
                { path: "src/lib/start-page-validation-primitives.ts", mode: "100644", type: "blob", sha: "84ddd1d4410bf8c45ea534eeb0808d769000f3e5" },
                { path: "src/newtab/block-renderers-integrations.ts", mode: "100644", type: "blob", sha: "83cdee352bd8fd8287e56e0b0260b01ea161ba69" },
                { path: "src/lib/start-page-settings.ts", mode: "100644", type: "blob", sha: "234bd37b41c271cdb84a8b0d33f3f137548d26dc" },
                { path: "scripts/round5-fixtures.ts", mode: "100644", type: "blob", sha: "f957fe5be6a40952f131606ad3be72066b27715a" },
                { path: "scripts/validate-static.mjs", mode: "100644", type: "blob", sha: "9263973aac46ee699345e4a9ae1711b32f303571" },
                { path: "scripts/validate-build-output.mjs", mode: "100644", type: "blob", sha: "097e9d90d0bdf2151eca84eb9a3336101627f414" }
              ]
            }),
          });
          const commit = await api("/git/commits", {
            method: "POST",
            body: JSON.stringify({
              message: "fix: complete round 5 audit hardening",
              tree: tree.sha,
              parents: [process.env.PARENT_SHA],
            }),
          });
          await api(`/git/refs/heads/${encodeURIComponent(process.env.BRANCH_NAME)}`, {
            method: "PATCH",
            body: JSON.stringify({ sha: commit.sha, force: false }),
          });
          console.log(`Applied audited commit ${commit.sha}`);
          NODE

  typecheck-build:
    if: github.event_name == 'pull_request' || github.ref_name == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --loglevel=error
      - name: Locale parity report
        run: node scripts/report-locale-parity.mjs
      - name: Upload locale parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locale-parity-report
          path: |
            locale-parity-report.json
            src/_locales/en/messages.json
            src/_locales/ru/messages.json
            src/_locales/ru/roadmap-messages.json
          retention-days: 1
      - name: Complete validation suite
        run: |
          mkdir -p validation-logs
          status=0
          run_check() {
            name="$1"
            shift
            echo "::group::$name"
            if "$@" >"validation-logs/$name.log" 2>&1; then
              echo "$name passed"
            else
              echo "$name failed"
              status=1
            fi
            cat "validation-logs/$name.log"
            echo "::endgroup::"
          }
          run_check test npm run test
          run_check typecheck npm run typecheck
          run_check build-full npm run build
          run_check build-blocker-only npm run build:blocker-only
          exit "$status"
      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: |
            validation-logs
            package-lock.json
            src/lib/chrome-sync.ts
            src/lib/start-page-runtime.ts
            src/lib/start-page-validation.ts
            src/lib/theme-editor.ts
            src/newtab/block-renderers.ts
          retention-days: 1
      - name: Upload complete audit snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-audit-snapshot
          path: |
            .github/workflows/ci.yml
            build.mjs
            package.json
            package-lock.json
            tsconfig.json
            src
            scripts
            docs
            build
            build-blocker-only
          retention-days: 1
