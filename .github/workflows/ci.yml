name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --loglevel=error
      - name: Locale parity report
        run: node scripts/report-locale-parity.mjs
      - name: Upload locale parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locale-parity-report
          path: |
            locale-parity-report.json
            src/_locales/en/messages.json
            src/_locales/ru/messages.json
          retention-days: 1
      - name: Static validation
        run: npm run test
      - name: Typecheck
        run: npm run typecheck
      - name: Build full extension
        run: npm run build
      - name: Build blocker-only extension
        run: npm run build:blocker-only
