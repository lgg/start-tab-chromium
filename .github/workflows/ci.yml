name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --loglevel=error
      - name: Locale parity report
        run: node scripts/report-locale-parity.mjs
      - name: Upload locale parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locale-parity-report
          path: |
            locale-parity-report.json
            src/_locales/en/messages.json
            src/_locales/ru/messages.json
            src/_locales/ru/roadmap-messages.json
          retention-days: 1
      - name: Complete validation suite
        run: |
          mkdir -p validation-logs
          status=0
          run_check() {
            name="$1"
            shift
            echo "::group::$name"
            if "$@" >"validation-logs/$name.log" 2>&1; then
              echo "$name passed"
            else
              echo "$name failed"
              status=1
            fi
            cat "validation-logs/$name.log"
            echo "::endgroup::"
          }
          run_check test npm run test
          run_check typecheck npm run typecheck
          run_check build-full npm run build
          run_check build-blocker-only npm run build:blocker-only
          exit "$status"
      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: |
            validation-logs
            package-lock.json
            src/lib/chrome-sync.ts
            src/lib/start-page-runtime.ts
            src/lib/start-page-validation.ts
            src/lib/theme-editor.ts
            src/newtab/block-renderers.ts
          retention-days: 1
      - name: Upload complete audit snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-audit-snapshot
          path: |
            .github/workflows/ci.yml
            build.mjs
            package.json
            package-lock.json
            tsconfig.json
            src
            scripts
            docs
            icons
            build
            build-blocker-only
          retention-days: 1
