name: CI

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: start-tab-chromium-ci
    timeout-minutes: 10
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout exact audit branch
        uses: actions/checkout@v6
        with:
          ref: codex/post-round28-deep-audit-20260721
          clean: false
          fetch-depth: 1
          persist-credentials: true
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          architecture: x64
          package-manager-cache: false

      - name: Apply exact Round 29 source patch
        run: node scripts/apply-round29.mjs

      - name: Commit Round 29 source patch
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/blocklist.ts src/lib/start-page-runtime.ts src/lib/google-integration.ts scripts/round29-fixtures.ts package.json
          if (-not (git diff --cached --quiet)) {
            git commit -m "Apply Round 29 production hardening"
            git push origin HEAD:codex/post-round28-deep-audit-20260721
          }
