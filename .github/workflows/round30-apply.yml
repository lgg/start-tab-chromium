name: Apply Round 30 Audit Patch

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: start-tab-chromium-ci
    timeout-minutes: 10
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout exact audit branch
        uses: actions/checkout@v6
        with:
          ref: codex/post-round29-deep-audit-20260721
          clean: false
          fetch-depth: 1
          persist-credentials: true
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          architecture: x64
          package-manager-cache: false

      - name: Reset only Round 30 patch targets
        run: |
          git restore --source=HEAD --staged --worktree -- src/lib/blocklist.ts src/lib/google-integration.ts scripts/round29-fixtures.ts scripts/validate-round29-static.mjs package.json .github/workflows/ci.yml scripts/validate-self-hosted-ci.mjs scripts/apply-round30.mjs scripts/fix-round30-applicator.mjs

      - name: Detect an already applied patch
        run: |
          $source = Get-Content -LiteralPath 'src/lib/blocklist.ts' -Raw
          $applied = $source.Contains('function assertDynamicRuleCapacity(')
          "ROUND30_ALREADY_APPLIED=$($applied.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Repair and validate exact applicator
        if: env.ROUND30_ALREADY_APPLIED != 'true'
        run: |
          node scripts/fix-round30-applicator.mjs
          node --check scripts/apply-round30.mjs

      - name: Apply exact Round 30 patch
        if: env.ROUND30_ALREADY_APPLIED != 'true'
        run: node scripts/apply-round30.mjs

      - name: Validate and stage Round 30 patch
        if: env.ROUND30_ALREADY_APPLIED != 'true'
        run: |
          git diff --check
          git add src/lib/blocklist.ts src/lib/google-integration.ts scripts/round29-fixtures.ts scripts/validate-round29-static.mjs package.json .github/workflows/ci.yml scripts/validate-self-hosted-ci.mjs
          git diff --cached --stat

      - name: Commit Round 30 patch
        if: env.ROUND30_ALREADY_APPLIED != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Apply Round 30 audit hardening"

      - name: Push Round 30 patch
        if: env.ROUND30_ALREADY_APPLIED != 'true'
        run: git push origin HEAD:codex/post-round29-deep-audit-20260721
