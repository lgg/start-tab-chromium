name: Apply Round 31 Audit Patch

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: start-tab-chromium-ci
    timeout-minutes: 10
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout exact audit branch
        uses: actions/checkout@v6
        with:
          ref: codex/post-round30-deep-audit-20260721
          clean: false
          fetch-depth: 1
          persist-credentials: true
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          architecture: x64
          package-manager-cache: false

      - name: Reset only Round 31 patch targets
        run: |
          git restore --source=HEAD --staged --worktree -- src/lib/blocklist.ts src/lib/chrome-sync.ts package.json scripts/validate-self-hosted-ci.mjs scripts/apply-round31.mjs scripts/apply-round31-followup.mjs

      - name: Detect applied Round 31 stages
        run: |
          $blocklist = Get-Content -LiteralPath 'src/lib/blocklist.ts' -Raw
          $sync = Get-Content -LiteralPath 'src/lib/chrome-sync.ts' -Raw
          $mainApplied = $blocklist.Contains('start-tab-blocklist-v1') -and $sync.Contains('completeChromeSyncPayload')
          $followupApplied = $blocklist.Contains('url.host !== blockedUrl.host') -and $sync.Contains('meta.chunks !== chunks.length')
          "ROUND31_ALREADY_APPLIED=$($mainApplied.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ROUND31_FOLLOWUP_APPLIED=$($followupApplied.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate exact main applicator
        if: env.ROUND31_ALREADY_APPLIED != 'true'
        run: node --check scripts/apply-round31.mjs

      - name: Apply exact Round 31 main patch
        if: env.ROUND31_ALREADY_APPLIED != 'true'
        run: node scripts/apply-round31.mjs

      - name: Validate exact follow-up applicator
        if: env.ROUND31_FOLLOWUP_APPLIED != 'true'
        run: node --check scripts/apply-round31-followup.mjs

      - name: Apply exact Round 31 follow-up
        if: env.ROUND31_FOLLOWUP_APPLIED != 'true'
        run: node scripts/apply-round31-followup.mjs

      - name: Validate and stage Round 31 source patch
        if: env.ROUND31_ALREADY_APPLIED != 'true' || env.ROUND31_FOLLOWUP_APPLIED != 'true'
        run: |
          git diff --check
          git add src/lib/blocklist.ts src/lib/chrome-sync.ts package.json scripts/validate-self-hosted-ci.mjs
          git diff --cached --stat

      - name: Commit Round 31 source patch
        if: env.ROUND31_ALREADY_APPLIED != 'true' || env.ROUND31_FOLLOWUP_APPLIED != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Complete Round 31 audit hardening"

      - name: Push Round 31 source patch
        if: env.ROUND31_ALREADY_APPLIED != 'true' || env.ROUND31_FOLLOWUP_APPLIED != 'true'
        run: git push origin HEAD:codex/post-round30-deep-audit-20260721
