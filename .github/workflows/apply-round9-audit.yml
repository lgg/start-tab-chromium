name: Apply Round 9 audit snapshot

on:
  push:
    branches:
      - codex/deep-audit-round-9-20260715

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply exact locally audited patch
        run: |
          base64 -d .github/round9.patch.gz.b64 | gzip -d > /tmp/round9.patch
          git apply --check -p1 /tmp/round9.patch
          git apply -p1 /tmp/round9.patch
          rm .github/round9.patch.gz.b64 .github/workflows/apply-round9-audit.yml
          git diff --check
      - name: Validate complete snapshot
        run: |
          npm ci --no-audit --no-fund --loglevel=error
          npm test
          npm run typecheck
          npm run build
          npm run build:blocker-only
          GOOGLE_OAUTH_CLIENT_ID=round9-validation.apps.googleusercontent.com npm run build:google
          npm audit --audit-level=low
      - name: Commit validated production diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deep audit round 9: clocks, restore transactions, and race hardening"
          git push origin "HEAD:${GITHUB_REF_NAME}"
