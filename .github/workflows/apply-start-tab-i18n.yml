PATCH_B64
          base64 -d /tmp/start-tab-i18n.patch.b64 > /tmp/start-tab-i18n.patch
          git apply /tmp/start-tab-i18n.patch
          git mv 'Screenshots/About to Blacklist.png' 'Screenshots/About Start Tab.png'
          git mv 'Screenshots/Facebook Blacklist.png' 'Screenshots/Facebook Start Tab.png'
          git mv 'Screenshots/Unlist Facebook.png' 'Screenshots/Unblock Facebook.png'
          rm -f .github/workflows/apply-start-tab-i18n.yml

      - name: Verify update
        shell: bash
        run: |
          set -euo pipefail
          npm ci --cache /tmp/npm-cache --prefer-offline
          npm run typecheck
          npm run build
          npm audit --cache /tmp/npm-cache --audit-level=moderate
          node -e "for (const f of ['src/manifest.json','src/_locales/en/messages.json','src/_locales/ru/messages.json','build/manifest.json','build/_locales/en/messages.json','build/_locales/ru/messages.json']) { JSON.parse(require('node:fs').readFileSync(f,'utf8')); console.log('ok', f); }"
          if rg 'Blacklist|Blacklisted|blacklisted|lgg/Blacklist|Unlist|unlist|unlisting' --glob '!node_modules/**' --glob '!build/**'; then
            echo 'Old branding or terminology remains.' >&2
            exit 1
          fi

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rename to Start Tab and add i18n"
          git push
