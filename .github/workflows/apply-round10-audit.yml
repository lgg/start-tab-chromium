name: Apply Round 10 audited snapshot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-validate-commit:
    if: github.event.pull_request.head.ref == 'codex/deep-audit-round-10-20260715'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply exact locally audited patch
        run: |
          cat \
            .github/round10.patch.part1 \
            .github/round10.patch.part2 \
            .github/round10.patch.part3 \
            .github/round10.patch.part4 \
            .github/round10.patch.part5 \
            | base64 -d | gzip -d > /tmp/round10.patch
          test "$(sha256sum /tmp/round10.patch | awk '{print $1}')" = "04eecadb7318fd9753eea08613c005e5e33aead75e907854bc4a35c5d27e7f7a"
          git apply --check /tmp/round10.patch
          git apply /tmp/round10.patch
          sed -i 's/[[:space:]]\+$//' docs/audit-2026-07-15-round-10.md
          rm \
            .github/round10.patch.gz.b64 \
            .github/round10.patch.part1 \
            .github/round10.patch.part2 \
            .github/round10.patch.part3 \
            .github/round10.patch.part4 \
            .github/round10.patch.part5
          git diff --check
      - name: Validate exact source snapshot
        run: |
          npm ci --no-audit --no-fund --loglevel=error
          npm test
          npm run typecheck
          npm run build
          npm run build:blocker-only
          GOOGLE_OAUTH_CLIENT_ID=round10-remote.apps.googleusercontent.com npm run build:google
          npm audit --omit=dev
      - name: Stage validated source-only diff
        run: |
          git add -f docs/audit-2026-07-15-round-10.md
          git add -u
          git diff --cached --check
          git diff --cached --name-status
      - name: Create validated source commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Deep audit round 10: atomic sync and revision transactions"
      - name: Push validated source commit
        run: git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
