name: Apply Round 10 audited snapshot

on:
  push:
    branches:
      - codex/deep-audit-round-10-20260715

permissions:
  contents: write

jobs:
  apply-validate-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply exact locally audited patch
        run: |
          base64 -d .github/round10.patch.gz.b64 | gzip -d > /tmp/round10.patch
          git apply --check /tmp/round10.patch
          git apply /tmp/round10.patch
          rm .github/round10.patch.gz.b64 .github/workflows/apply-round10-audit.yml
          git diff --check
      - name: Validate exact source snapshot
        run: |
          npm ci --no-audit --no-fund --loglevel=error
          npm test
          npm run typecheck
          npm run build
          npm run build:blocker-only
          GOOGLE_OAUTH_CLIENT_ID=round10-remote.apps.googleusercontent.com npm run build:google
          npm audit --omit=dev
      - name: Commit validated source-only diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/lib/backup.ts \
            src/lib/blocklist.ts \
            src/lib/chrome-sync.ts \
            src/lib/data-revision.ts \
            src/lib/focus-stats.ts \
            src/lib/i18n.ts \
            src/lib/start-page-runtime.ts \
            src/lib/start-page-settings.ts \
            src/newtab/newtab.ts \
            scripts/round6-fixtures.ts \
            scripts/round7-fixtures.ts \
            scripts/validate-round6-static.mjs \
            scripts/validate-round7-static.mjs \
            docs/audit-2026-07-15-round-10.md
          git add -u .github/round10.patch.gz.b64 .github/workflows/apply-round10-audit.yml
          git diff --cached --check
          git commit -m "Deep audit round 10: atomic sync and revision transactions"
          git push origin "HEAD:${GITHUB_REF_NAME}"
