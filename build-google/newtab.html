<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Start Tab</title>
    <link rel="stylesheet" href="shared-ui.css" />
    <link rel="stylesheet" href="newtab.css" />
  </head>
  <body>
    <div class="background" id="background" aria-hidden="true"></div>
    <main class="start-page" id="startPage">
      <div class="editor-toolbar" id="editorToolbar"></div>
      <aside class="palette" id="blockPalette" hidden></aside>
      <section class="grid" id="grid" aria-live="off"></section>
      <div class="settings-hover-zone" aria-hidden="true"></div>
      <button class="native-new-tab-button icon-button" id="nativeNewTab" type="button"></button>
      <button class="settings-button icon-button" id="settings" type="button">⚙</button>
      <p class="visually-hidden" id="statusRegion" role="status" aria-live="polite"></p>
    </main>
    <script src="newtab-gate.js"></script>
    <script type="module" src="newtab.js"></script>
  </body>
</html>
