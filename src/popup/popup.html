<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title></title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <img class="popup__icon" src="icons/icon.48.png" alt="" />
        <h1 class="popup__title" id="title"></h1>
      </header>

      <p class="popup__site" id="site" hidden></p>

      <button class="btn btn--primary" id="primary" hidden></button>

      <p class="popup__note" id="note" hidden></p>

      <footer class="popup__footer">
        <label class="popup__language" for="language">
          <span id="languageLabel"></span>
          <select class="popup__language-select" id="language">
            <option value="auto" id="languageAuto"></option>
            <option value="en" id="languageEnglish"></option>
            <option value="ru" id="languageRussian"></option>
          </select>
        </label>
        <button class="btn btn--link" id="clear"></button>
      </footer>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
